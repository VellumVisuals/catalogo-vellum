<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vellum Visuals | Links</title>
    <style>
        body {
            background-color: #F9F8F6; /* Off-white de luxo */
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;

            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;

        }

            border: 1px solid #D1CDC7; /* Borda Champagne */

            padding: 20px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.4s ease;
        }

        .link-button:hover {
            background-color: #4A4542;
            color: #F9F8F6;
            border-color: #4A4542;
        }

        .footer {
            margin-top: 80px;
            font-size: 9px;

            text-transform: uppercase;
        }

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vellum Visuals | Links</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body {
            /* Fundo preto profundo com sutil textura de papel via gradiente e ruído simulado */
            background: radial-gradient(circle at center, #1A1A1A 0%, #0D0D0D 100%);
            background-color: #0D0D0D;
            font-family: 'Inter', sans-serif;
            color: #C5A059; /* Dourado assinatura */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            margin: 0;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Sobreposição para simular grão de papel */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.03;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Animação de Revelação */
        @keyframes reveal {
            from {
                opacity: 0;
                transform: translateY(20px);
                filter: blur(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        .profile-container {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 1px solid #C5A059;
            padding: 5px;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
            opacity: 0;
            animation: reveal 1.5s cubic-bezier(0.2, 1, 0.3, 1) forwards;
            animation-delay: 0.5s;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            filter: grayscale(0.5) contrast(1.1); /* Filtro para combinar com a marca */
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-weight: 400;
            margin-bottom: 10px;
            text-align: center;
            font-style: italic;
            
            /* Efeito Dourado Degradê no Texto */
            background: linear-gradient(to right, #8E7955 0%, #F1D396 25%, #C5A059 50%, #F1D396 75%, #8E7955 100%);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            transition: background-position 0.8s ease-in-out, transform 0.5s ease;
            cursor: default;
            opacity: 0;
            animation: reveal 1.5s cubic-bezier(0.2, 1, 0.3, 1) forwards;
            animation-delay: 0.8s;
        }

        .logo:hover {
            background-position: -100% center;
            transform: scale(1.02);
        }

        .subtitle {
            font-size: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #8E7955; /* Dourado mais fechado */
            margin-bottom: 40px;
            font-weight: 300;
            opacity: 0;
            animation: reveal 1.5s cubic-bezier(0.2, 1, 0.3, 1) forwards;
            animation-delay: 1s;
        }

        .divider {
            width: 40px;
            height: 1px;
            background-color: #8E7955;
            margin: 0 auto 30px;
            opacity: 0;
            animation: reveal 1.5s cubic-bezier(0.2, 1, 0.3, 1) forwards;
            animation-delay: 1.2s;
        }

        .container {
            width: 100%;
            max-width: 380px;
            position: relative;
            z-index: 1;
        }

        .link-button {
            display: block;
            background-color: transparent;
            border: 1px solid #C5A059; /* Borda dourada */
            color: #C5A059; /* Texto dourado */
            text-decoration: none;
            padding: 22px;
            margin-bottom: 18px;
            text-align: center;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
            opacity: 0;
            animation: reveal 1.2s cubic-bezier(0.2, 1, 0.3, 1) forwards;
        }

        /* Delays individuais para os botões */
        .link-button:nth-child(1) { animation-delay: 1.5s; }
        .link-button:nth-child(2) { animation-delay: 1.7s; }
        .link-button:nth-child(3) { animation-delay: 1.9s; }

        .link-button:hover {
            background: linear-gradient(135deg, #C5A059 0%, #F1D396 50%, #C5A059 100%);
            color: #0D0D0D; /* Texto preto no hover */
            border-color: transparent;
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(197, 160, 89, 0.2);
            font-weight: 600;
        }

        .footer {
            margin-top: auto;
            padding-top: 60px;
            font-size: 8px;
            letter-spacing: 3px;
            color: #55514D;
            text-transform: uppercase;
            text-align: center;
            opacity: 0;
            animation: reveal 1.5s cubic-bezier(0.2, 1, 0.3, 1) forwards;
            animation-delay: 2.2s;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <!-- Imagem de exemplo que remete ao design editorial/arquitetura -->
        <img src="links/images/1.png" alt="Vellum Estúdio" class="profile-img">
    </div>

    <div class="logo">Vellum</div>
    <div class="subtitle">Visuals & Estúdio</div>
    
    <div class="divider"></div>

    <div class="container">
        <a href="https://www.vellumvisuals.com.br" class="link-button">Catálogo Institucional</a>
        
        <a href="https://www.vellumvisuals.com.br/briefing" class="link-button">Solicitar Orçamento</a>
        
        <a href="https://wa.me/5514981398630" class="link-button">Atendimento Direto</a>
    </div>

    <div class="footer">
        Design Editorial • Experiência Visual de Elite<br>
        © 2024 Vellum Visuals
    </div>

</body>
</html>

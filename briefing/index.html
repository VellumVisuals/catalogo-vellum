<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vellum Visuals - Diagnóstico Criativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --dark-gold: #996515; --black-bg: #0a0a0a; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--black-bg); color: #e5e5e5; overflow-x: hidden; }
        h1, h2, .playfair { font-family: 'Playfair Display', serif; }
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); }
        .gold-border { border: 1px solid rgba(212, 175, 55, 0.2); transition: all 0.3s ease; background: rgba(255, 255, 255, 0.02); color: white; outline: none; width: 100%; }
        .gold-border:focus { border-color: var(--gold); background: rgba(212, 175, 55, 0.05); box-shadow: 0 0 10px rgba(212, 175, 55, 0.1); }
        .gold-text { color: var(--gold); }
        .gold-gradient-bg { background: linear-gradient(135deg, var(--dark-gold) 0%, var(--gold) 50%, var(--dark-gold) 100%); }
        .custom-file-upload { border: 1px dashed rgba(212, 175, 55, 0.3); display: block; padding: 20px; cursor: pointer; text-align: center; border-radius: 12px; transition: all 0.3s; }
        .custom-file-upload:hover { background: rgba(212, 175, 55, 0.08); border-color: var(--gold); }
        .loading-spinner { border: 3px solid rgba(0,0,0,0.1); border-radius: 50%; border-top-color: black; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        ::placeholder { color: #4b5563; }
    </style>
</head>
<body class="min-h-screen py-16 px-4">
    <canvas id="bg-canvas"></canvas>
    <div class="max-w-4xl mx-auto bg-black/40 backdrop-blur-2xl rounded-[2.5rem] shadow-2xl overflow-hidden border border-white/5">
        <div class="p-12 text-center border-b border-white/5">
            <span class="text-[0.65rem] tracking-[0.4em] uppercase text-gray-500 mb-4 block">Vellum Visuals</span>
            <h1 class="text-4xl md:text-6xl font-bold mb-6 gold-text leading-tight">Bem-vinda à sua nova era visual.</h1>
        </div>

        <form id="briefingForm" class="p-8 md:p-16 space-y-16">
            <section class="space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <input type="text" name="cliente_nome" required class="gold-border p-4 rounded-xl" placeholder="Seu Nome Completo">
                    <input type="text" name="cliente_whatsapp" required class="gold-border p-4 rounded-xl" placeholder="WhatsApp">
                    <input type="email" name="cliente_email" required class="gold-border p-4 rounded-xl md:col-span-2" placeholder="E-mail Profissional">
                </div>
            </section>

            <section class="space-y-8">
                <input type="text" name="marca_nome" required class="gold-border p-4 rounded-xl" placeholder="Nome da sua Marca">
                <textarea name="marca_persona" rows="3" placeholder="Sua marca como pessoa..." class="gold-border p-4 rounded-xl resize-none"></textarea>
                <textarea name="diferencial" rows="3" placeholder="Seu maior diferencial..." class="gold-border p-4 rounded-xl resize-none"></textarea>
                <textarea name="outros_detalhes" rows="2" class="gold-border p-4 rounded-xl resize-none" placeholder="Observações adicionais"></textarea>
            </section>

            <section class="space-y-8">
                <textarea name="cliente_ideal" rows="3" class="gold-border p-4 rounded-xl resize-none" placeholder="Quem é seu cliente ideal?"></textarea>
                <select name="faturamento_meta" required class="gold-border p-4 rounded-xl bg-black">
                    <option value="" disabled selected>Estágio do Negócio</option>
                    <option value="entrada">Até R$ 10k/mês</option>
                    <option value="expansao">R$ 10k a R$ 30k/mês</option>
                    <option value="elite">Acima de R$ 50k/mês</option>
                </select>
            </section>

            <section class="space-y-8">
                <input type="text" name="sentimento_3_palavras" class="gold-border p-4 rounded-xl" placeholder="3 palavras definidoras">
                <textarea name="inspira_3_marcas" rows="2" class="gold-border p-4 rounded-xl resize-none" placeholder="Marcas que te inspiram"></textarea>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <label class="custom-file-upload">
                        <span id="label_catalogo" class="text-xs text-gray-400">Upload Catálogo</span>
                        <input type="file" id="file_catalogo" class="hidden" onchange="document.getElementById('label_catalogo').innerText = this.files[0].name">
                    </label>
                    <label class="custom-file-upload">
                        <span id="label_print" class="text-xs text-gray-400">Upload Screenshot</span>
                        <input type="file" id="file_print" class="hidden" onchange="document.getElementById('label_print').innerText = this.files[0].name">
                    </label>
                </div>
            </section>

            <div class="pt-8 space-y-6">
                <button type="submit" id="submitBtn" class="w-full gold-gradient-bg text-black py-5 px-8 rounded-2xl font-bold uppercase tracking-[0.2em] flex items-center justify-center space-x-3">
                    <span id="btnText">Enviar para Vellum Visuals</span>
                    <div id="spinner" class="loading-spinner hidden"></div>
                </button>
                <p id="statusMsg" class="text-center text-sm hidden"></p>
            </div>
        </form>
    </div>

    <script>
        // Fundo Animado Simplificado para Performance
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
        window.addEventListener('resize', resize); resize();

        // INTEGRAÇÃO GOOGLE
        const GOOGLE_SCRIPT_URL = "COLE_AQUI_O_NOVO_LINK_EXEC"; 

        const form = document.getElementById('briefingForm');
        const submitBtn = document.getElementById('submitBtn');
        const spinner = document.getElementById('spinner');
        const btnText = document.getElementById('btnText');
        const statusMsg = document.getElementById('statusMsg');

        const getFileData = file => new Promise((resolve) => {
            if(!file) return resolve(null);
            const reader = new FileReader();
            reader.onload = () => resolve({ base64: reader.result.split(',')[1], type: file.type, name: file.name });
            reader.readAsDataURL(file);
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true; spinner.classList.remove('hidden'); btnText.innerText = "Sincronizando...";

            try {
                const formData = new FormData(form);
                const data = {
                    contato_nome: formData.get('cliente_nome'),
                    contato_whatsapp: formData.get('cliente_whatsapp'),
                    contato_email: formData.get('cliente_email'),
                    marca: formData.get('marca_nome'),
                    persona: formData.get('marca_persona'),
                    diferencial: formData.get('diferencial'),
                    outros: formData.get('outros_detalhes'),
                    faturamento_meta: formData.get('faturamento_meta'),
                    sentimento: formData.get('sentimento_3_palavras'),
                    inspira_marcas: formData.get('inspira_3_marcas'),
                    arquivo_catalogo: await getFileData(document.getElementById('file_catalogo').files[0]),
                    arquivo_print: await getFileData(document.getElementById('file_print').files[0])
                };

                await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });

                statusMsg.innerText = "✓ Enviado com sucesso. Sua nova era começa agora.";
                statusMsg.style.color = "#D4AF37";
                statusMsg.classList.remove('hidden');
                form.reset();
            } catch (err) {
                statusMsg.innerText = "Erro ao enviar. Tente novamente.";
                statusMsg.style.color = "red";
                statusMsg.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false; spinner.classList.add('hidden'); btnText.innerText = "Enviar para Vellum Visuals";
            }
        });
    </script>
</body>
</html>

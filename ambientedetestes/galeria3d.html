<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vellum 3D Showroom</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Inter', sans-serif; touch-action: none; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); color: white; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; text-align: center;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 4px; height: 4px;
            background: white; border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; opacity: 0.5;
        }
        #ui-layer {
            position: absolute; bottom: 30px; left: 30px; color: white;
            pointer-events: none; text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .notification {
            position: absolute; top: 20px; right: 20px; background: #10b981;
            color: white; padding: 12px 24px; border-radius: 4px; font-weight: bold;
            transform: translateX(150%); transition: transform 0.3s ease;
        }
        /* Mobile Controls */
        #mobile-controls {
            position: absolute; bottom: 40px; right: 40px;
            display: none; flex-direction: column; gap: 20px;
            z-index: 50; pointer-events: auto;
        }
        .joy-btn {
            width: 70px; height: 70px; background: rgba(255,255,255,0.2);
            border: 2px solid white; border-radius: 50%; color: white;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 24px; user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .joy-btn:active { background: rgba(255,255,255,0.5); }
        
        .mode-button {
            background: white; color: black; padding: 15px 40px;
            border-radius: 8px; font-weight: bold; margin: 10px;
            transition: all 0.2s; cursor: pointer;
        }
        .mode-button:hover { transform: scale(1.05); background: #eee; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 class="text-3xl font-bold mb-2">LOJA VIRTUAL 3D</h1>
        <p class="mb-8 opacity-70 px-6 text-lg">Como você deseja explorar hoje?</p>
        
        <div class="flex flex-col sm:flex-row gap-4">
            <div id="btn-pc" class="mode-button">COMPUTADOR (Mouse/Teclado)</div>
            <div id="btn-mobile" class="mode-button">CELULAR / VR (Giroscópio)</div>
        </div>
        
        <div class="mt-10 text-xs opacity-40 uppercase tracking-widest">
            Vellum L'Art de Vivre
        </div>
    </div>

    <div id="crosshair"></div>
    <div id="notification" class="notification">Item adicionado ao carrinho!</div>

    <div id="mobile-controls">
        <div id="btn-w" class="joy-btn">W</div>
        <div id="btn-s" class="joy-btn">S</div>
    </div>

    <div id="ui-layer">
        <h2 id="target-name" class="text-2xl font-bold"></h2>
        <p id="target-price" class="text-xl opacity-80"></p>
    </div>

    <script>
        // --- CONFIGURAÇÕES ---
        const API_URL = "https://catalogo-vellum-lartdevivre.vercel.app/api/get-products?first=250";
        
        let scene, camera, renderer, raycaster;
        let pitch = 0, yaw = 0; // Mouse look
        const keys = { w: false, a: false, s: false, d: false };
        const pedestals = [];
        const textureLoader = new THREE.TextureLoader();

        // VR / Giroscópio
        let useGyro = false;
        let isMobileMode = false;
        
        // --- INICIALIZAÇÃO ---
        async function init() {
            // Cena
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);
            scene.fog = new THREE.Fog(0x0a0a0a, 1, 60);

            // Câmera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.rotation.order = 'YXZ';
            camera.position.set(0, 1.7, 5); // Começa um pouco afastado do centro

            // Renderizador
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Luzes
            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(10, 20, 10);
            scene.add(directionalLight);

            // Chão
            const floorGeo = new THREE.PlaneGeometry(500, 500);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // Grade do chão
            const grid = new THREE.GridHelper(500, 100, 0x333333, 0x222222);
            scene.add(grid);

            raycaster = new THREE.Raycaster();

            setupListeners();
            createDebugPedestal(); // Adicionado pedestal de teste imediato
            await fetchData();
            animate();
        }

        // --- CONTROLES E EVENTOS ---
        function setupListeners() {
            const overlay = document.getElementById('overlay');
            const btnPC = document.getElementById('btn-pc');
            const btnMobile = document.getElementById('btn-mobile');
            const mobileControls = document.getElementById('mobile-controls');

            // ESCOLHA: PC
            btnPC.addEventListener('click', () => {
                isMobileMode = false;
                document.body.requestPointerLock();
                overlay.style.display = 'none';
                mobileControls.style.display = 'none';
            });

            // ESCOLHA: MOBILE
            btnMobile.addEventListener('click', async () => {
                isMobileMode = true;
                overlay.style.display = 'none';
                mobileControls.style.display = 'flex';

                // Request Sensor Permissions for iOS
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    try {
                        const permission = await DeviceOrientationEvent.requestPermission();
                        if (permission === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                            useGyro = true;
                        }
                    } catch (e) { console.error(e); }
                } else {
                    // Android e outros
                    window.addEventListener('deviceorientation', handleOrientation);
                    useGyro = true;
                }
            });

            document.addEventListener('pointerlockchange', () => {
                if (!document.pointerLockElement && !isMobileMode) {
                    overlay.style.display = 'flex';
                }
            });

            // MOUSE LOOK (PC)
            document.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement && !useGyro) {
                    yaw -= e.movementX * 0.002;
                    pitch -= e.movementY * 0.002;
                    pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitch));

                    camera.rotation.x = pitch;
                    camera.rotation.y = yaw;
                }
            });

            // GIROSCÓPIO (MOBILE)
            function handleOrientation(event) {
                if (!event.alpha) return;
                
                // Conversão para radianos
                let b = event.beta * (Math.PI / 180);  
                let a = event.alpha * (Math.PI / 180); 

                // Lógica de visualização VR Simples
                camera.rotation.y = a; 
                camera.rotation.x = b - Math.PI/2; 
            }

            // TECLADO
            document.addEventListener('keydown', (e) => { 
                const k = e.key.toLowerCase();
                if (k in keys) keys[k] = true; 
            });
            document.addEventListener('keyup', (e) => { 
                const k = e.key.toLowerCase();
                if (k in keys) keys[k] = false; 
            });

            // TOQUE (MOBILE)
            const btnW = document.getElementById('btn-w');
            const btnS = document.getElementById('btn-s');

            btnW.addEventListener('touchstart', (e) => { e.preventDefault(); keys.w = true; });
            btnW.addEventListener('touchend', () => { keys.w = false; });
            btnS.addEventListener('touchstart', (e) => { e.preventDefault(); keys.s = true; });
            btnS.addEventListener('touchend', () => { keys.s = false; });

            document.addEventListener('mousedown', (e) => {
                // Evita disparar interação ao clicar nos botões de movimento
                if (e.target.classList.contains('joy-btn')) return;
                if (document.pointerLockElement || useGyro) interact();
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        // --- DADOS E OBJETOS ---
        async function fetchData() {
            try {
                console.log("Buscando produtos...");
                const res = await fetch(API_URL);
                const json = await res.json();
                
                const items = json.data?.products?.edges || [];
                console.log("Produtos encontrados:", items.length);
                
                const cols = 10; 
                const spacing = 8;

                items.forEach((edge, i) => {
                    const item = edge.node;
                    const r = Math.floor(i / cols);
                    const c = i % cols;
                    const x = (c - cols / 2) * spacing;
                    const z = (r + 1) * spacing * -1;
                    createPedestal(item, x, z);
                });
            } catch (e) {
                console.error("Erro ao carregar dados da API:", e);
            }
        }

        function createPedestal(data, x, z) {
            const group = new THREE.Group();
            group.position.set(x, 0, z);

            // 1. Base do Pedestal (Cubo)
            const baseGeo = new THREE.BoxGeometry(2, 1.2, 2);
            const baseMat = new THREE.MeshStandardMaterial({ color: 0x252525 });
            const base = new THREE.Mesh(baseGeo, baseMat);
            base.position.y = 0.6;
            group.add(base);

            // 2. Foto do Produto
            const photoUrl = data.images?.edges?.[0]?.node?.url || data.fallbackImage;
            if (photoUrl) {
                textureLoader.load(photoUrl, (tex) => {
                    const planeGeo = new THREE.PlaneGeometry(1.8, 1.8);
                    const planeMat = new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide, transparent: true });
                    const plane = new THREE.Mesh(planeGeo, planeMat);
                    plane.position.y = 2.4;
                    group.add(plane);
                    plane.userData.isPhoto = true;
                });
            } else {
                const placeholderGeo = new THREE.BoxGeometry(1, 1, 0.1);
                const placeholder = new THREE.Mesh(placeholderGeo, new THREE.MeshStandardMaterial({ color: 0x555555 }));
                placeholder.position.y = 2.4;
                group.add(placeholder);
            }

            // 3. Tag de Preço
            const priceVal = data.variants?.edges?.[0]?.node?.priceV2?.amount || '0';
            const priceCurr = "BRL"; 
            const priceText = `${priceCurr} ${priceVal}`;

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 256; canvas.height = 80;
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, 256, 80);
            ctx.fillStyle = '#000000';
            ctx.font = 'bold 32px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(priceText, 128, 50);

            const tagTex = new THREE.CanvasTexture(canvas);
            const tagGeo = new THREE.PlaneGeometry(1.4, 0.45);
            const tagMat = new THREE.MeshBasicMaterial({ map: tagTex });
            const tag = new THREE.Mesh(tagGeo, tagMat);
            tag.position.set(0, 1.0, 1.01); 
            group.add(tag);

            group.userData = { 
                name: data.title, 
                price: priceText,
                isPedestal: true 
            };

            scene.add(group);
            pedestals.push(group);
        }

        // --- LÓGICA ---
        function interact() {
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const hits = raycaster.intersectObjects(pedestals, true);
            
            if (hits.length > 0) {
                const notif = document.getElementById('notification');
                notif.style.transform = 'translateX(0)';
                setTimeout(() => notif.style.transform = 'translateX(150%)', 2000);
            }
        }

        function updateMovement(delta) {
            if (!document.pointerLockElement && !useGyro) return;

            const speed = 10.0 * delta;
            
            const camDir = new THREE.Vector3();
            camera.getWorldDirection(camDir);
            camDir.y = 0;
            camDir.normalize();

            const sideDir = new THREE.Vector3().crossVectors(camera.up, camDir).normalize();

            if (keys.w) camera.position.addScaledVector(camDir, speed);
            if (keys.s) camera.position.addScaledVector(camDir, -speed);
            if (keys.a) camera.position.addScaledVector(sideDir, speed);
            if (keys.d) camera.position.addScaledVector(sideDir, -speed);
            
            camera.position.y = 1.7;
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = 0.016; 

            updateMovement(delta);

            pedestals.forEach(p => {
                p.children.forEach(c => {
                    if (c.userData.isPhoto) c.rotation.y += 0.01;
                });
            });

            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const hits = raycaster.intersectObjects(pedestals, true);
            const uiName = document.getElementById('target-name');
            const uiPrice = document.getElementById('target-price');

            if (hits.length > 0) {
                let p = hits[0].object;
                while(p && !p.userData.isPedestal) p = p.parent;
                if (p) {
                    uiName.innerText = p.userData.name;
                    uiPrice.innerText = p.userData.price;
                }
            } else {
                uiName.innerText = "";
                uiPrice.innerText = "";
            }

            renderer.render(scene, camera);
        }

        function createDebugPedestal() {
            const debugData = {
                title: "PRODUTO TESTE (INICIAL)",
                variants: { edges: [{ node: { priceV2: { amount: "99.90" } } }] },
                images: { edges: [] },
                fallbackImage: ""
            };
            createPedestal(debugData, 0, 0); 
            
            const lastPedestal = pedestals[pedestals.length - 1];
            const whitePlaneGeo = new THREE.PlaneGeometry(1.8, 1.8);
            const whitePlaneMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide });
            const whitePlane = new THREE.Mesh(whitePlaneGeo, whitePlaneMat);
            whitePlane.position.y = 2.4;
            whitePlane.userData.isPhoto = true;
            lastPedestal.add(whitePlane);
        }

        window.onload = init;
    </script>
</body>
</html>
